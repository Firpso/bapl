<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Yandex Clone</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
}

.search-box {
    display: flex;
    align-items: center;
    background: #3a3a3a;
    border-radius: 30px;
    padding: 10px 15px;
    width: 650px;
    gap: 10px;
    margin-bottom: 10px;
}

.logo {
    font-weight: bold;
    font-size: 22px;
    color: #ff3b30;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 16px;
}

input::placeholder { color: #aaa; }

button {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}
button:hover { color: white; }

.footer-links {
    display: flex;
    gap: 25px;
    font-size: 14px;
    margin-bottom: 40px; /* ← Добавлено: отступ снизу */
}
.footer-links a {
    color: #ccc;
    text-decoration: none;
    transition: 0.2s;
}
.footer-links a:hover { color: white; }

/* === ВИДЖЕТ ЗАКЛАДОК === */
.bookmarks-widget {
    background: #3a3a3a;
    border-radius: 12px;
    padding: 15px 20px;
    width: 650px;
    margin-top: 10px;
}

.bookmarks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #555;
}
.bookmarks-title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}
.bookmarks-clear {
    color: #888;
    font-size: 12px;
    background: none;
    border: none;
    cursor: pointer;
}
.bookmarks-clear:hover { color: #ff5555; }

/* Сетка иконок */
.bookmarks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 12px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 4px;
}

/* Плитка закладки */
.bookmark-tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
}

.bookmark-tile.dragging {
    opacity: 0.5;
    transform: scale(1.05);
    cursor: grabbing;
}

.bookmark-tile.drag-over {
    transform: scale(1.1);
}

.bookmark-icon {
    width: 64px;
    height: 64px;
    background: #2b2b2b;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
}

.bookmark-icon img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    transition: opacity 0.2s;
    pointer-events: none; /* Важно для drag */
}

.bookmark-icon .placeholder {
    font-size: 28px;
    color: #666;
    pointer-events: none;
}

.bookmark-tile:hover .bookmark-icon {
    border-color: #0366d6;
    background: #252525;
}

.bookmark-name {
    font-size: 11px;
    color: #ccc;
    text-align: center;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
}

/* ✏️ Карандаш */
.bookmark-edit-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    background: #4a4a4a;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: background 0.2s;
    pointer-events: auto;
}
.bookmark-tile:hover .bookmark-edit-btn { display: flex; }
.bookmark-edit-btn:hover { background: #0366d6; }

/* ➕ Плитка добавления */
.add-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}

.add-tile .bookmark-icon {
    background: #3a3a3a;
    border: 2px dashed #555;
}

.add-tile:hover .bookmark-icon {
    border-color: #0366d6;
    background: #252525;
}

.add-tile .bookmark-icon::before {
    content: '+';
    font-size: 32px;
    color: #888;
    font-weight: 300;
}

.add-tile:hover .bookmark-icon::before {
    color: #0366d6;
}

.add-tile .bookmark-name {
    color: #888;
    font-size: 11px;
}

.add-tile:hover .bookmark-name {
    color: #0366d6;
}

/* 🎭 МОДАЛЬНОЕ ОКНО */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }

.modal-content {
    background: #2b2b2b;
    border: 1px solid #555;
    border-radius: 14px;
    padding: 24px;
    width: 320px;
    max-width: 90%;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    position: relative;
    animation: modalSlideIn 0.2s ease-out;
}

@keyframes modalSlideIn {
    from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #444;
}

.modal-title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}

.modal-close {
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
}
.modal-close:hover { color: white; }

.modal-body {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.modal-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.modal-row label {
    font-size: 12px;
    color: #aaa;
    font-weight: 500;
}

.modal-row input {
    padding: 10px 12px;
    background: #3a3a3a;
    border: 1px solid #555;
    border-radius: 8px;
    color: white;
    font-size: 14px;
}
.modal-row input:focus {
    outline: 2px solid #0366d6;
    border-color: transparent;
}

.modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

.modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
}

.modal-actions .save-btn {
    background: #0366d6;
    color: white;
}
.modal-actions .save-btn:hover { background: #0255b3; }

.modal-actions .cancel-btn {
    background: #4a4a4a;
    color: white;
}
.modal-actions .cancel-btn:hover { background: #5a5a5a; }

/* Скроллбар */
.bookmarks-grid::-webkit-scrollbar { width: 4px; }
.bookmarks-grid::-webkit-scrollbar-track { background: #2b2b2b; border-radius: 2px; }
.bookmarks-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
.bookmarks-grid::-webkit-scrollbar-thumb:hover { background: #666; }

/* === КОНТЕЙНЕР: поиск + кнопка === */
.search-container {
    display: flex !important;           /* ← Включаем flex */
    align-items: center;                /* Вертикальное центрирование */
    justify-content: center;            /* Центрируем всю строку */
    gap: 10px;                          /* Отступ между поиском и кнопкой */
    flex-wrap: nowrap !important;       /* ← Запрещаем перенос */
    width: fit-content;                 /* По содержимому, не 100% */
    margin: 0 auto 20px;                /* Центрируем + отступ снизу */
}

/* Поисковая форма — центрирована как была */
.search-box {
    display: flex;
    align-items: center;
    background: #3a3a3a;
    border-radius: 30px;
    padding: 10px 15px;
    width: 650px;
    gap: 10px;
    margin: 0 auto 10px;    /* ← Центрируем + отступ до футера */
    position: relative;     /* ← Важно для абсолютного позиционирования кнопки */
}

/* Кнопка камеры — абсолютно справа от формы */
#imgBtn {
    position: absolute;
    right: -54px;           /* ← Выносим за пределы формы (44px кнопка + 10px отступ) */
    top: 50%;
    transform: translateY(-50%);  /* ← Центрируем по вертикали */
    
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    transition: all 0.2s;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
}

#imgBtn:hover {
    color: white;
    background: rgba(255,255,255,0.1);
}

/* SVG иконка */
.icon-svg {
    width: 24px;
    height: 24px;
    display: block;
}

</style>
</head>

<body>

<!-- Общий контейнер для строки поиска -->
<!-- Общий контейнер: поиск + кнопка камеры -->
<!-- Поисковая форма с относительным позиционированием -->
<form class="search-box" action="https://yandex.ru/search/" method="get">
    <div class="logo">Я</div>
    <input type="text" name="text" placeholder="Найдётся всё">
    <button type="submit">Найти</button>
    
    <!-- Кнопка камеры внутри формы, но позиционируется абсолютно -->
    <button type="button" id="imgBtn" class="icon-btn" title="Поиск по картинке">
        <svg class="icon-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <path fill="currentColor" d="M60,10H49.656l-6.828-6.828C42.078,2.422,41.062,2,40,2H24c-1.062,0-2.078,0.422-2.828,1.172L14.344,10H4
            c-2.211,0-4,1.789-4,4v44c0,2.211,1.789,4,4,4h56c2.211,0,4-1.789,4-4V14C64,11.789,62.211,10,60,10z M32,50
            c-8.836,0-16-7.164-16-16s7.164-16,16-16s16,7.164,16,16S40.836,50,32,50z"/>
            <circle fill="currentColor" cx="32" cy="34" r="8"/>
        </svg>
    </button>
</form>

<div class="footer-links">
    <a href="https://yandex.ru/images/" target="_blank">Поиск по картинке</a>
    <a href="https://yandex.ru/maps" target="_blank">Карты</a>
    <a href="https://translate.yandex.ru/" target="_blank">Переводчик</a>
    <a href="https://translate.yandex.ru/ocr" target="_blank">OCR</a>
</div>

<!-- === ВИДЖЕТ ЗАКЛАДОК === -->
<div class="bookmarks-widget">
    <div class="bookmarks-header">
        <span class="bookmarks-title">🔖 Закладки</span>
        <button class="bookmarks-clear" onclick="clearAllBookmarks()">Очистить всё</button>
    </div>
    
    <div class="bookmarks-grid" id="bookmarksGrid">
        <!-- Иконки закладок + плитка "+" будут здесь -->
    </div>
</div>

<!-- 🎭 МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ -->
<div class="modal-overlay" id="addModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">➕ Добавить закладку</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        
        <div class="modal-body">
            <div class="modal-row">
                <label>URL сайта *</label>
                <input type="url" id="modalUrl" placeholder="https://example.com">
            </div>
            
            <div class="modal-row">
                <label>Название (необязательно)</label>
                <input type="text" id="modalName" placeholder="Например: YouTube">
            </div>
            
            <div class="modal-row">
                <label>URL иконки (необязательно)</label>
                <input type="url" id="modalIcon" placeholder="https://example.com/icon.png">
            </div>
            
            <div class="modal-actions">
                <button class="save-btn" onclick="saveBookmark()">Добавить</button>
                <button class="cancel-btn" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
</div>

<!-- 🎭 МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title">✏️ Редактировать закладку</span>
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        
        <div class="modal-body">
            <div class="modal-row">
                <label>Название</label>
                <input type="text" id="editName" placeholder="Например: YouTube">
            </div>
            
            <div class="modal-row">
                <label>URL иконки (необязательно)</label>
                <input type="url" id="editIcon" placeholder="https://example.com/icon.png">
            </div>
            
            <div class="modal-actions">
                <button class="save-btn" onclick="saveEdit()">Сохранить</button>
                <button class="cancel-btn" onclick="deleteBookmark()">Удалить</button>
            </div>
        </div>
    </div>
</div>


<script>
// === ОРИГИНАЛЬНЫЙ ФУНКЦИОНАЛ ===
document.getElementById('imgBtn').onclick = () => {
    window.location.href = "https://yandex.ru/images/";
};

document.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    for (let item of items) {
        if (item.type.startsWith("image")) {
            window.location.href = "https://yandex.ru/images/";
            return;
        }
    }
});

// === ЛОГИКА ЗАКЛАДОК ===
const STORAGE_KEY = 'yandex_clone_bookmarks';
let activeEditId = null;
let isEditMode = false;

// Drag & Drop переменные
let draggedElement = null;
let draggedId = null;

document.addEventListener('DOMContentLoaded', () => {
    renderBookmarks();
    
    // Закрытие по Escape
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
            closeEditModal();
        }
    });
    
    // Авто-заполнение названия при вводе URL
    document.getElementById('modalUrl').addEventListener('input', autoFillName);
});

// Авто-заполнение названия из URL
function autoFillName() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    
    if (nameInput.value.trim() !== '') return;
    
    let url = urlInput.value.trim();
    if (url.startsWith('http://') || url.startsWith('https://')) {
        try {
            const urlObj = new URL(url);
            const name = urlObj.hostname.replace('www.', '').split('.')[0];
            nameInput.value = name.charAt(0).toUpperCase() + name.slice(1);
        } catch {}
    }
}

// Открыть модальное окно добавления
function openAddModal() {
    isEditMode = false;
    document.getElementById('modalTitle').textContent = '➕ Добавить закладку';
    document.getElementById('modalUrl').value = '';
    document.getElementById('modalName').value = '';
    document.getElementById('modalIcon').value = '';
    document.getElementById('addModal').classList.add('active');
    document.getElementById('modalUrl').focus();
}

// Открыть модальное окно редактирования
function openEditModal(event, id) {
    event.stopPropagation();
    isEditMode = true;
    activeEditId = id;
    
    const bookmarks = getBookmarks();
    const bookmark = bookmarks.find(bm => bm.id === id);
    if (!bookmark) return;
    
    document.getElementById('editName').value = bookmark.name;
    document.getElementById('editIcon').value = bookmark.customIcon || '';
    
    document.getElementById('editModal').classList.add('active');
    document.getElementById('editName').focus();
}

// Закрыть модальное окно добавления
function closeModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('addModal').classList.remove('active');
}

// Закрыть модальное окно редактирования
function closeEditModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('editModal').classList.remove('active');
    activeEditId = null;
}

// Добавить закладку
function addBookmark() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    const iconInput = document.getElementById('modalIcon');
    
    let url = urlInput.value.trim();
    let name = nameInput.value.trim();
    let customIcon = iconInput.value.trim() || null;
    
    if (!url) { alert('Введите URL сайта'); return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
    }
    
    let domain;
    try {
        const urlObj = new URL(url);
        domain = urlObj.hostname;
        if (!name) {
            name = domain.replace('www.', '').split('.')[0];
            name = name.charAt(0).toUpperCase() + name.slice(1);
        }
    } catch {
        domain = url;
        if (!name) name = 'Site';
    }
    
    const bookmarks = getBookmarks();
    if (bookmarks.some(bm => bm.domain === domain)) {
        alert('Этот сайт уже в закладках!');
        return;
    }
    
    bookmarks.unshift({
        id: Date.now(),
        url,
        domain,
        name,
        customIcon
    });
    
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeModal();
}

function saveBookmark() {
    addBookmark();
}

function saveEdit() {
    const nameInput = document.getElementById('editName');
    const iconInput = document.getElementById('editIcon');
    
    const newName = nameInput.value.trim();
    const newIcon = iconInput.value.trim() || null;
    
    if (!newName) { alert('Введите название'); return; }
    
    let bookmarks = getBookmarks();
    const idx = bookmarks.findIndex(bm => bm.id === activeEditId);
    if (idx !== -1) {
        bookmarks[idx].name = newName;
        bookmarks[idx].customIcon = newIcon;
        saveBookmarks(bookmarks);
        renderBookmarks();
    }
    closeEditModal();
}

function deleteBookmark() {
    if (!confirm('Удалить эту закладку?')) return;
    
    let bookmarks = getBookmarks();
    bookmarks = bookmarks.filter(bm => bm.id !== activeEditId);
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeEditModal();
}

function getBookmarks() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
    } catch { return []; }
}

function saveBookmarks(bookmarks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
}

function getFaviconUrl(domain, customIcon) {
    if (customIcon) return customIcon;
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
}

// === DRAG & DROP ФУНКЦИИ ===

function handleDragStart(e) {
    draggedElement = this;
    draggedId = parseInt(this.dataset.id);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggedId);
}

function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    
    if (this !== draggedElement && !this.classList.contains('add-tile')) {
        this.classList.add('drag-over');
    }
}

function handleDragLeave(e) {
    this.classList.remove('drag-over');
}

function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    
    if (!draggedId || this === draggedElement || this.classList.contains('add-tile')) {
        return;
    }
    
    const targetId = parseInt(this.dataset.id);
    if (!targetId || targetId === draggedId) return;
    
    // Перемещаем закладку в массиве
    let bookmarks = getBookmarks();
    const draggedIndex = bookmarks.findIndex(bm => bm.id === draggedId);
    const targetIndex = bookmarks.findIndex(bm => bm.id === targetId);
    
    if (draggedIndex === -1 || targetIndex === -1) return;
    
    // Удаляем из старого места и вставляем в новое
    const [draggedBookmark] = bookmarks.splice(draggedIndex, 1);
    bookmarks.splice(targetIndex, 0, draggedBookmark);
    
    saveBookmarks(bookmarks);
    renderBookmarks();
}

function handleDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.bookmark-tile').forEach(tile => {
        tile.classList.remove('drag-over');
    });
    draggedElement = null;
    draggedId = null;
}

// Отрисовка закладок
function renderBookmarks() {
    const grid = document.getElementById('bookmarksGrid');
    const bookmarks = getBookmarks();
    
    grid.innerHTML = '';
    
    // Добавляем плитки закладок
    bookmarks.forEach(bm => {
        const tile = document.createElement('div');
        tile.className = 'bookmark-tile';
        tile.dataset.id = bm.id;
        tile.draggable = true; // Включаем drag
        
        // Drag & Drop события
        tile.addEventListener('dragstart', handleDragStart);
        tile.addEventListener('dragover', handleDragOver);
        tile.addEventListener('dragleave', handleDragLeave);
        tile.addEventListener('drop', handleDrop);
        tile.addEventListener('dragend', handleDragEnd);
        
        const iconUrl = getFaviconUrl(bm.domain, bm.customIcon);
        
        tile.innerHTML = `
            <div class="bookmark-icon">
                <img src="${iconUrl}" alt="${bm.name}"
                     onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>🌐</span>'">
                <button class="bookmark-edit-btn" onclick="openEditModal(event, ${bm.id})" title="Редактировать">✎</button>
            </div>
            <span class="bookmark-name">${escapeHtml(bm.name)}</span>
        `;
        
        // Клик по плитке открывает сайт (но не при drag)
        tile.addEventListener('click', (e) => {
            if (!e.target.closest('.bookmark-edit-btn') && !draggedId) {
                window.open(bm.url, '_blank');
            }
        });
        
        grid.appendChild(tile);
    });
    
    // Добавляем плитку "+" в конце (не перетаскивается)
    const addTile = document.createElement('div');
    addTile.className = 'add-tile';
    addTile.onclick = openAddModal;
    addTile.innerHTML = `
        <div class="bookmark-icon"></div>
        <span class="bookmark-name">Добавить</span>
    `;
    grid.appendChild(addTile);
}

function clearAllBookmarks() {
    if (confirm('Удалить ВСЕ закладки?')) {
        localStorage.removeItem(STORAGE_KEY);
        renderBookmarks();
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>

</body>
</html>
