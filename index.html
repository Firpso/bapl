<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Yandex Clone</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
}

.search-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: nowrap;
    width: fit-content;
    margin: 0 auto 20px;
}

.search-box {
    display: flex;
    align-items: center;
    background: #3a3a3a;
    border-radius: 30px;
    padding: 10px 15px;
    width: 650px;
    gap: 10px;
    margin: 0;
    flex-shrink: 0;
    position: relative;
}

.logo {
    font-weight: bold;
    font-size: 22px;
    color: #ff3b30;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 16px;
}

input::placeholder { color: #aaa; }

button {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}
button:hover { color: white; }

/* Кнопка камеры */
#imgBtn {
    position: absolute;
    right: -54px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    transition: all 0.2s;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
}

#imgBtn:hover {
    color: white;
    background: rgba(255,255,255,0.1);
}

.icon-svg {
    width: 24px;
    height: 24px;
    display: block;
}

/* Верхние ссылки */
.footer-links {
    display: flex;
    gap: 20px;
    font-size: 13px;
    justify-content: center;
    margin: 0 0 15px 0;
}
.footer-links a {
    color: #aaa;
    text-decoration: none;
    transition: 0.2s;
}
.footer-links a:hover {
    color: white;
    text-decoration: underline;
}

/* === ВИДЖЕТ ЗАКЛАДОК === */
.bookmarks-widget {
    background: #3a3a3a;
    border-radius: 12px;
    padding: 15px 20px;
    width: 650px;
    margin-top: 10px;
}

.bookmarks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #555;
    flex-wrap: wrap;
    gap: 10px;
}

.bookmarks-title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}

.bookmarks-actions {
    display: flex;
    gap: 8px;
    align-items: center;
}

.bookmarks-btn {
    font-size: 12px;
    color: #aaa;
    background: #2b2b2b;
    border: 1px solid #555;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
}
.bookmarks-btn:hover {
    color: white;
    border-color: #0366d6;
    background: #252525;
}
.bookmarks-btn.danger:hover {
    color: white;
    border-color: #ff5555;
    background: #ff5555;
}

/* Скрытый input для импорта */
#importInput {
    display: none;
}

/* Сетка иконок */
.bookmarks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 12px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 4px;
}

/* Плитка закладки */
.bookmark-tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
}

.bookmark-tile.dragging {
    opacity: 0.5;
    transform: scale(1.05);
    cursor: grabbing;
}

.bookmark-tile.drag-over {
    transform: scale(1.1);
}

.bookmark-icon {
    width: 64px;
    height: 64px;
    background: #2b2b2b;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
}

.bookmark-icon img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    transition: opacity 0.2s;
    pointer-events: none;
}

.bookmark-icon .placeholder {
    font-size: 28px;
    color: #666;
    pointer-events: none;
}

.bookmark-tile:hover .bookmark-icon {
    border-color: #0366d6;
    background: #252525;
}

.bookmark-name {
    font-size: 11px;
    color: #ccc;
    text-align: center;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
}

/* ✏️ Карандаш */
.bookmark-edit-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    background: #4a4a4a;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3;
    transition: background 0.2s;
    pointer-events: auto;
}
.bookmark-tile:hover .bookmark-edit-btn { display: flex; }
.bookmark-edit-btn:hover { background: #0366d6; }

/* ➕ Плитка добавления */
.add-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}

.add-tile .bookmark-icon {
    background: #3a3a3a;
    border: 2px dashed #555;
}

.add-tile:hover .bookmark-icon {
    border-color: #0366d6;
    background: #252525;
}

.add-tile .bookmark-icon::before {
    content: '+';
    font-size: 32px;
    color: #888;
    font-weight: 300;
}

.add-tile:hover .bookmark-icon::before {
    color: #0366d6;
}

.add-tile .bookmark-name {
    color: #888;
    font-size: 11px;
}

.add-tile:hover .bookmark-name {
    color: #0366d6;
}

/* 🎭 МОДАЛЬНОЕ ОКНО */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }

.modal-content {
    background: #2b2b2b;
    border: 1px solid #555;
    border-radius: 14px;
    padding: 24px;
    width: 320px;
    max-width: 90%;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    position: relative;
    animation: modalSlideIn 0.2s ease-out;
}

@keyframes modalSlideIn {
    from {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #444;
}

.modal-title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}

.modal-close {
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
}
.modal-close:hover { color: white; }

.modal-body {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.modal-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.modal-row label {
    font-size: 12px;
    color: #aaa;
    font-weight: 500;
}

.modal-row input {
    padding: 10px 12px;
    background: #3a3a3a;
    border: 1px solid #555;
    border-radius: 8px;
    color: white;
    font-size: 14px;
}
.modal-row input:focus {
    outline: 2px solid #0366d6;
    border-color: transparent;
}

.modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

.modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
}

.modal-actions .save-btn {
    background: #0366d6;
    color: white;
}
.modal-actions .save-btn:hover { background: #0255b3; }

.modal-actions .cancel-btn {
    background: #4a4a4a;
    color: white;
}
.modal-actions .cancel-btn:hover { background: #5a5a5a; }

/* Скроллбар */
.bookmarks-grid::-webkit-scrollbar { width: 4px; }
.bookmarks-grid::-webkit-scrollbar-track { background: #2b2b2b; border-radius: 2px; }
.bookmarks-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
.bookmarks-grid::-webkit-scrollbar-thumb:hover { background: #666; }

/* Уведомления */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #3a3a3a;
    border: 1px solid #555;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 2000;
    transition: transform 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show {
    transform: translateX(-50%) translateY(0);
}
.toast.success { border-color: #4caf50; }
.toast.error { border-color: #ff5555; }
</style>
</head>

<body>

<!-- Верхние ссылки -->
<div class="footer-links">
    <a href="https://yandex.ru/images/" target="_blank">Поиск по картинке</a>
    <a href="https://yandex.ru/maps" target="_blank">Карты</a>
    <a href="https://translate.yandex.ru/" target="_blank">Переводчик</a>
    <a href="https://translate.yandex.ru/ocr" target="_blank">OCR</a>
</div>

<!-- Поиск + кнопка камеры -->
<div class="search-container">
    <form class="search-box" action="https://yandex.ru/search/" method="get">
        <div class="logo">Я</div>
        <input type="text" name="text" placeholder="Найдётся всё">
        <button type="submit">Найти</button>
        
        <button type="button" id="imgBtn" title="Поиск по картинке">
            <svg class="icon-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M60,10H49.656l-6.828-6.828C42.078,2.422,41.062,2,40,2H24c-1.062,0-2.078,0.422-2.828,1.172L14.344,10H4
                c-2.211,0-4,1.789-4,4v44c0,2.211,1.789,4,4,4h56c2.211,0,4-1.789,4-4V14C64,11.789,62.211,10,60,10z M32,50
                c-8.836,0-16-7.164-16-16s7.164-16,16-16s16,7.164,16,16S40.836,50,32,50z"/>
                <circle fill="currentColor" cx="32" cy="34" r="8"/>
            </svg>
        </button>
    </form>
</div>

<!-- === ВИДЖЕТ ЗАКЛАДОК === -->
<div class="bookmarks-widget">
    <div class="bookmarks-header">
        <span class="bookmarks-title">🔖 Закладки</span>
        <div class="bookmarks-actions">
            <button class="bookmarks-btn" onclick="exportBookmarks()" title="Скачать закладки">📤 Экспорт</button>
            <button class="bookmarks-btn" onclick="document.getElementById('importInput').click()" title="Загрузить закладки">📥 Импорт</button>
            <button class="bookmarks-btn danger" onclick="clearAllBookmarks()" title="Удалить все">🗑️ Очистить всё</button>
        </div>
    </div>
    
    <div class="bookmarks-grid" id="bookmarksGrid">
        <!-- Иконки закладок + плитка "+" будут здесь -->
    </div>
</div>

<!-- Скрытый input для импорта -->
<input type="file" id="importInput" accept=".json" onchange="importBookmarks(event)">

<!-- 🎭 МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ -->
<div class="modal-overlay" id="addModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">➕ Добавить закладку</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        
        <div class="modal-body">
            <div class="modal-row">
                <label>URL сайта *</label>
                <input type="url" id="modalUrl" placeholder="https://example.com">
            </div>
            
            <div class="modal-row">
                <label>Название (необязательно)</label>
                <input type="text" id="modalName" placeholder="Например: YouTube">
            </div>
            
            <div class="modal-row">
                <label>URL иконки (необязательно)</label>
                <input type="url" id="modalIcon" placeholder="https://example.com/icon.png">
            </div>
            
            <div class="modal-actions">
                <button class="save-btn" onclick="saveBookmark()">Добавить</button>
                <button class="cancel-btn" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
</div>

<!-- 🎭 МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ -->
<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title">✏️ Редактировать закладку</span>
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        
        <div class="modal-body">
            <div class="modal-row">
                <label>Название</label>
                <input type="text" id="editName" placeholder="Например: YouTube">
            </div>
            
            <div class="modal-row">
                <label>URL иконки (необязательно)</label>
                <input type="url" id="editIcon" placeholder="https://example.com/icon.png">
            </div>
            
            <div class="modal-actions">
                <button class="save-btn" onclick="saveEdit()">Сохранить</button>
                <button class="cancel-btn" onclick="deleteBookmark()">Удалить</button>
            </div>
        </div>
    </div>
</div>

<!-- Уведомления -->
<div class="toast" id="toast"></div>

<div class="footer-links" style="margin-top: 20px;">
    <a href="https://images.google.com/" target="_blank">Google Images</a>
    <a href="https://translate.google.com/" target="_blank">Google Переводчик</a>
</div>

<script>
// === ОРИГИНАЛЬНЫЙ ФУНКЦИОНАЛ ===
document.getElementById('imgBtn').onclick = () => {
    window.location.href = "https://yandex.ru/images/";
};

document.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    for (let item of items) {
        if (item.type.startsWith("image")) {
            window.location.href = "https://yandex.ru/images/";
            return;
        }
    }
});

// === ЛОГИКА ЗАКЛАДОК ===
const STORAGE_KEY = 'yandex_clone_bookmarks';
let activeEditId = null;
let isEditMode = false;

// Drag & Drop переменные
let draggedElement = null;
let draggedId = null;

document.addEventListener('DOMContentLoaded', () => {
    renderBookmarks();
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            closeModal();
            closeEditModal();
        }
    });
    
    document.getElementById('modalUrl').addEventListener('input', autoFillName);
});

// Уведомления
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => {
        toast.className = 'toast';
    }, 3000);
}

// Авто-заполнение названия из URL
function autoFillName() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    
    if (nameInput.value.trim() !== '') return;
    
    let url = urlInput.value.trim();
    if (url.startsWith('http://') || url.startsWith('https://')) {
        try {
            const urlObj = new URL(url);
            const name = urlObj.hostname.replace('www.', '').split('.')[0];
            nameInput.value = name.charAt(0).toUpperCase() + name.slice(1);
        } catch {}
    }
}

// Открыть модальное окно добавления
function openAddModal() {
    isEditMode = false;
    document.getElementById('modalTitle').textContent = '➕ Добавить закладку';
    document.getElementById('modalUrl').value = '';
    document.getElementById('modalName').value = '';
    document.getElementById('modalIcon').value = '';
    document.getElementById('addModal').classList.add('active');
    document.getElementById('modalUrl').focus();
}

// Открыть модальное окно редактирования
function openEditModal(event, id) {
    event.stopPropagation();
    isEditMode = true;
    activeEditId = id;
    
    const bookmarks = getBookmarks();
    const bookmark = bookmarks.find(bm => bm.id === id);
    if (!bookmark) return;
    
    document.getElementById('editName').value = bookmark.name;
    document.getElementById('editIcon').value = bookmark.customIcon || '';
    
    document.getElementById('editModal').classList.add('active');
    document.getElementById('editName').focus();
}

// Закрыть модальное окно добавления
function closeModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('addModal').classList.remove('active');
}

// Закрыть модальное окно редактирования
function closeEditModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('editModal').classList.remove('active');
    activeEditId = null;
}

// Добавить закладку
function addBookmark() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    const iconInput = document.getElementById('modalIcon');
    
    let url = urlInput.value.trim();
    let name = nameInput.value.trim();
    let customIcon = iconInput.value.trim() || null;
    
    if (!url) { showToast('Введите URL сайта', 'error'); return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) {
        url = 'https://' + url;
    }
    
    let domain;
    try {
        const urlObj = new URL(url);
        domain = urlObj.hostname;
        if (!name) {
            name = domain.replace('www.', '').split('.')[0];
            name = name.charAt(0).toUpperCase() + name.slice(1);
        }
    } catch {
        domain = url;
        if (!name) name = 'Site';
    }
    
    const bookmarks = getBookmarks();
    if (bookmarks.some(bm => bm.domain === domain)) {
        showToast('Этот сайт уже в закладках!', 'error');
        return;
    }
    
    bookmarks.unshift({
        id: Date.now(),
        url,
        domain,
        name,
        customIcon
    });
    
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeModal();
    showToast('Закладка добавлена!', 'success');
}

function saveBookmark() {
    addBookmark();
}

function saveEdit() {
    const nameInput = document.getElementById('editName');
    const iconInput = document.getElementById('editIcon');
    
    const newName = nameInput.value.trim();
    const newIcon = iconInput.value.trim() || null;
    
    if (!newName) { showToast('Введите название', 'error'); return; }
    
    let bookmarks = getBookmarks();
    const idx = bookmarks.findIndex(bm => bm.id === activeEditId);
    if (idx !== -1) {
        bookmarks[idx].name = newName;
        bookmarks[idx].customIcon = newIcon;
        saveBookmarks(bookmarks);
        renderBookmarks();
        showToast('Закладка обновлена!', 'success');
    }
    closeEditModal();
}

function deleteBookmark() {
    if (!confirm('Удалить эту закладку?')) return;
    
    let bookmarks = getBookmarks();
    bookmarks = bookmarks.filter(bm => bm.id !== activeEditId);
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeEditModal();
    showToast('Закладка удалена', 'success');
}

function getBookmarks() {
    try {
        const data = localStorage.getItem(STORAGE_KEY);
        return data ? JSON.parse(data) : [];
    } catch { return []; }
}

function saveBookmarks(bookmarks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
}

function getFaviconUrl(domain, customIcon) {
    if (customIcon) return customIcon;
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
}

// === ЭКСПОРТ / ИМПОРТ ===

// Экспорт закладок в JSON файл
function exportBookmarks() {
    const bookmarks = getBookmarks();
    
    if (bookmarks.length === 0) {
        showToast('Нет закладок для экспорта', 'error');
        return;
    }
    
    const data = {
        version: 1,
        exportedAt: new Date().toISOString(),
        bookmarks: bookmarks
    };
    
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    
    const a = document.createElement('a');
    a.href = url;
    a.download = `bookmarks-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showToast(`Экспортировано ${bookmarks.length} закладок`, 'success');
}

// Импорт закладок из JSON файла
function importBookmarks(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            
            // Проверка формата
            if (!data.bookmarks || !Array.isArray(data.bookmarks)) {
                throw new Error('Неверный формат файла');
            }
            
            const imported = data.bookmarks;
            const current = getBookmarks();
            
            // Фильтруем дубликаты по domain
            let newCount = 0;
            imported.forEach(bm => {
                if (!current.some(c => c.domain === bm.domain)) {
                    current.unshift({
                        id: Date.now() + Math.random(),
                        url: bm.url,
                        domain: bm.domain,
                        name: bm.name,
                        customIcon: bm.customIcon || null
                    });
                    newCount++;
                }
            });
            
            saveBookmarks(current);
            renderBookmarks();
            
            showToast(`Импортировано ${newCount} новых закладок`, 'success');
            
        } catch (err) {
            showToast('Ошибка импорта: неверный формат файла', 'error');
            console.error(err);
        }
    };
    
    reader.onerror = () => {
        showToast('Ошибка чтения файла', 'error');
    };
    
    reader.readAsText(file);
    
    // Сброс input для повторного импорта того же файла
    event.target.value = '';
}

// === DRAG & DROP ===

function handleDragStart(e) {
    draggedElement = this;
    draggedId = parseInt(this.dataset.id);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', draggedId);
}

function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    
    if (this !== draggedElement && !this.classList.contains('add-tile')) {
        this.classList.add('drag-over');
    }
}

function handleDragLeave(e) {
    this.classList.remove('drag-over');
}

function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    
    if (!draggedId || this === draggedElement || this.classList.contains('add-tile')) {
        return;
    }
    
    const targetId = parseInt(this.dataset.id);
    if (!targetId || targetId === draggedId) return;
    
    let bookmarks = getBookmarks();
    const draggedIndex = bookmarks.findIndex(bm => bm.id === draggedId);
    const targetIndex = bookmarks.findIndex(bm => bm.id === targetId);
    
    if (draggedIndex === -1 || targetIndex === -1) return;
    
    const [draggedBookmark] = bookmarks.splice(draggedIndex, 1);
    bookmarks.splice(targetIndex, 0, draggedBookmark);
    
    saveBookmarks(bookmarks);
    renderBookmarks();
}

function handleDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.bookmark-tile').forEach(tile => {
        tile.classList.remove('drag-over');
    });
    draggedElement = null;
    draggedId = null;
}

// Отрисовка закладок
function renderBookmarks() {
    const grid = document.getElementById('bookmarksGrid');
    const bookmarks = getBookmarks();
    
    grid.innerHTML = '';
    
    bookmarks.forEach(bm => {
        const tile = document.createElement('div');
        tile.className = 'bookmark-tile';
        tile.dataset.id = bm.id;
        tile.draggable = true;
        
        tile.addEventListener('dragstart', handleDragStart);
        tile.addEventListener('dragover', handleDragOver);
        tile.addEventListener('dragleave', handleDragLeave);
        tile.addEventListener('drop', handleDrop);
        tile.addEventListener('dragend', handleDragEnd);
        
        const iconUrl = getFaviconUrl(bm.domain, bm.customIcon);
        
        tile.innerHTML = `
            <div class="bookmark-icon">
                <img src="${iconUrl}" alt="${bm.name}"
                     onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>🌐</span>'">
                <button class="bookmark-edit-btn" onclick="openEditModal(event, ${bm.id})" title="Редактировать">✏️</button>
            </div>
            <span class="bookmark-name">${escapeHtml(bm.name)}</span>
        `;
        
        tile.querySelector('.bookmark-icon').addEventListener('click', (e) => {
            if (!e.target.closest('.bookmark-edit-btn') && !draggedId) {
                window.open(bm.url, '_blank');
            }
        });
        
        grid.appendChild(tile);
    });
    
    const addTile = document.createElement('div');
    addTile.className = 'add-tile';
    addTile.onclick = openAddModal;
    addTile.innerHTML = `
        <div class="bookmark-icon"></div>
        <span class="bookmark-name">Добавить</span>
    `;
    grid.appendChild(addTile);
}

function clearAllBookmarks() {
    if (confirm('Удалить ВСЕ закладки?')) {
        localStorage.removeItem(STORAGE_KEY);
        renderBookmarks();
        showToast('Все закладки удалены', 'success');
    }
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
