<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Yandex Clone</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
}

.search-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: nowrap;
    width: fit-content;
    margin: 0 auto 20px;
}

.search-box {
    display: flex;
    align-items: center;
    background: #3a3a3a;
    border-radius: 30px;
    padding: 10px 15px;
    width: 650px;
    gap: 10px;
    margin: 0;
    flex-shrink: 0;
    position: relative;
}

.logo {
    font-weight: bold;
    font-size: 22px;
    color: #ff3b30;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 16px;
}

input::placeholder { color: #aaa; }

button {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}
button:hover { color: white; }

#imgBtn {
    position: absolute;
    right: -54px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    transition: all 0.2s;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    flex-shrink: 0;
}

#imgBtn:hover {
    color: white;
    background: rgba(255,255,255,0.1);
}

.icon-svg {
    width: 24px;
    height: 24px;
    display: block;
}

.footer-links {
    display: flex;
    gap: 20px;
    font-size: 13px;
    justify-content: center;
    margin: 0 0 15px 0;
}
.footer-links a {
    color: #aaa;
    text-decoration: none;
    transition: 0.2s;
}
.footer-links a:hover {
    color: white;
    text-decoration: underline;
}

.bookmarks-widget {
    background: #3a3a3a;
    border-radius: 12px;
    padding: 15px 20px;
    width: 650px;
    margin-top: 10px;
}

.bookmarks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #555;
    flex-wrap: wrap;
    gap: 10px;
}

.bookmarks-title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}

.bookmarks-actions {
    display: flex;
    gap: 8px;
    align-items: center;
}

.bookmarks-btn {
    font-size: 12px;
    color: #aaa;
    background: #2b2b2b;
    border: 1px solid #555;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
}
.bookmarks-btn:hover {
    color: white;
    border-color: #0366d6;
    background: #252525;
}
.bookmarks-btn.danger:hover {
    color: white;
    border-color: #ff5555;
    background: #ff5555;
}

#importInput {
    display: none;
}

.bookmarks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 12px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 4px;
}

.bookmark-tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: grab;
    transition: transform 0.15s, opacity 0.15s;
    user-select: none;
}

.bookmark-tile:active {
    cursor: grabbing;
}

.bookmark-tile.dragging {
    opacity: 0.5;
    transform: scale(1.05);
    z-index: 100;
}

.bookmark-tile.drag-over {
    transform: scale(1.1);
    border: 2px dashed #0366d6;
}

.bookmark-icon {
    width: 64px;
    height: 64px;
    background: #2b2b2b;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid transparent;
    transition: all 0.2s;
    position: relative;
    overflow: visible;
}

.bookmark-icon img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    pointer-events: none;
}

.bookmark-icon .placeholder {
    font-size: 28px;
    color: #666;
    pointer-events: none;
    position: absolute;
    display: none;
}

.bookmark-icon.icon-error .placeholder {
    display: flex !important;
}

.bookmark-icon.icon-error img {
    display: none !important;
}

.bookmark-tile:hover .bookmark-icon {
    border-color: #0366d6;
    background: #252525;
}

.bookmark-name {
    font-size: 11px;
    color: #ccc;
    text-align: center;
    max-width: 70px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    pointer-events: none;
}

.bookmark-edit-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 22px;
    height: 22px;
    background: #4a4a4a;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
    transition: background 0.2s;
    pointer-events: auto;
}
.bookmark-tile:hover .bookmark-edit-btn { display: flex; }
.bookmark-edit-btn:hover { background: #0366d6; }

.add-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}

.add-tile .bookmark-icon {
    background: #3a3a3a;
    border: 2px dashed #555;
}

.add-tile:hover .bookmark-icon {
    border-color: #0366d6;
    background: #252525;
}

.add-tile .bookmark-icon::before {
    content: '+';
    font-size: 32px;
    color: #888;
    font-weight: 300;
}

.add-tile:hover .bookmark-icon::before {
    color: #0366d6;
}

.add-tile .bookmark-name {
    color: #888;
    font-size: 11px;
}

.add-tile:hover .bookmark-name {
    color: #0366d6;
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }

.modal-content {
    background: #2b2b2b;
    border: 1px solid #555;
    border-radius: 14px;
    padding: 24px;
    width: 320px;
    max-width: 90%;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    position: relative;
    animation: modalSlideIn 0.2s ease-out;
}

@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid #444;
}

.modal-title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}

.modal-close {
    background: none;
    border: none;
    color: #888;
    font-size: 24px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
}
.modal-close:hover { color: white; }

.modal-body {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.modal-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.modal-row label {
    font-size: 12px;
    color: #aaa;
    font-weight: 500;
}

.modal-row input {
    padding: 10px 12px;
    background: #3a3a3a;
    border: 1px solid #555;
    border-radius: 8px;
    color: white;
    font-size: 14px;
}
.modal-row input:focus {
    outline: 2px solid #0366d6;
    border-color: transparent;
}

.modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 8px;
}

.modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    transition: background 0.2s;
}

.modal-actions .save-btn {
    background: #0366d6;
    color: white;
}
.modal-actions .save-btn:hover { background: #0255b3; }

.modal-actions .cancel-btn {
    background: #4a4a4a;
    color: white;
}
.modal-actions .cancel-btn:hover { background: #5a5a5a; }

.bookmarks-grid::-webkit-scrollbar { width: 4px; }
.bookmarks-grid::-webkit-scrollbar-track { background: #2b2b2b; border-radius: 2px; }
.bookmarks-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
.bookmarks-grid::-webkit-scrollbar-thumb:hover { background: #666; }

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #3a3a3a;
    border: 1px solid #555;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 2000;
    transition: transform 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: #4caf50; }
.toast.error { border-color: #ff5555; }
</style>
</head>

<body>

<div class="footer-links">
    <a href="https://yandex.ru/images/">Поиск по картинке</a>
    <a href="https://yandex.ru/maps">Карты</a>
    <a href="https://translate.yandex.ru/">Переводчик</a>
    <a href="https://translate.yandex.ru/ocr">OCR</a>
</div>

<div class="search-container">
    <form class="search-box" action="https://yandex.ru/search/" method="get">
        <div class="logo">Я</div>
        <input type="text" name="text" placeholder="Найдётся всё">
        <button type="submit">Найти</button>
        
        <button type="button" id="imgBtn" title="Поиск по картинке">
            <svg class="icon-svg" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
                <path fill="currentColor" d="M60,10H49.656l-6.828-6.828C42.078,2.422,41.062,2,40,2H24c-1.062,0-2.078,0.422-2.828,1.172L14.344,10H4 c-2.211,0-4,1.789-4,4v44c0,2.211,1.789,4,4,4h56c2.211,0,4-1.789,4-4V14C64,11.789,62.211,10,60,10z M32,50 c-8.836,0-16-7.164-16-16s7.164-16,16-16s16,7.164,16,16S40.836,50,32,50z"/>
                <circle fill="currentColor" cx="32" cy="34" r="8"/>
            </svg>
        </button>
    </form>
</div>

<div class="bookmarks-widget">
    <div class="bookmarks-header">
        <span class="bookmarks-title">🔖 Закладки</span>
        <div class="bookmarks-actions">
            <button class="bookmarks-btn" onclick="exportBookmarks()">📤 Экспорт</button>
            <button class="bookmarks-btn" onclick="document.getElementById('importInput').click()">📥 Импорт</button>
            <button class="bookmarks-btn danger" onclick="clearAllBookmarks()">🗑️ Очистить всё</button>
        </div>
    </div>
    <div class="bookmarks-grid" id="bookmarksGrid"></div>
</div>

<input type="file" id="importInput" accept=".json" onchange="importBookmarks(event)">

<div class="modal-overlay" id="addModal" onclick="closeModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title" id="modalTitle">➕ Добавить закладку</span>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-row">
                <label>URL сайта *</label>
                <input type="url" id="modalUrl" placeholder="https://example.com">
            </div>
            <div class="modal-row">
                <label>Название</label>
                <input type="text" id="modalName" placeholder="YouTube">
            </div>
            <div class="modal-row">
                <label>URL иконки</label>
                <input type="url" id="modalIcon" placeholder="https://...">
            </div>
            <div class="modal-actions">
                <button class="save-btn" onclick="saveBookmark()">Добавить</button>
                <button class="cancel-btn" onclick="closeModal()">Отмена</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal" onclick="closeEditModal(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-header">
            <span class="modal-title">✏️ Редактировать</span>
            <button class="modal-close" onclick="closeEditModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-row">
                <label>Название</label>
                <input type="text" id="editName">
            </div>
            <div class="modal-row">
                <label>URL иконки</label>
                <input type="url" id="editIcon">
            </div>
            <div class="modal-actions">
                <button class="save-btn" onclick="saveEdit()">Сохранить</button>
                <button class="cancel-btn" onclick="deleteBookmark()">Удалить</button>
            </div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer-links" style="margin-top: 20px;">
    <a href="https://images.google.com/">Google Images</a>
    <a href="https://translate.google.com/">Google Переводчик</a>
    <a href="https://mail.google.com/mail/&ogbl">Google Почта</a>
    <a href="https://www.google.com/">Google Поисковик</a>
</div>

<script>
document.getElementById('imgBtn').onclick = () => {
    window.location.href = "https://yandex.ru/images/";
};

document.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    for (let item of items) {
        if (item.type.startsWith("image")) {
            window.location.href = "https://yandex.ru/images/";
            return;
        }
    }
});

const STORAGE_KEY = 'yandex_clone_bookmarks';
let activeEditId = null;
let draggedElement = null;
let draggedId = null;
let isDragging = false;
let idCounter = Date.now();

function generateId() { return ++idCounter; }

document.addEventListener('DOMContentLoaded', () => {
    const bookmarks = getBookmarks();
    if (bookmarks.length > 0) {
        idCounter = Math.max(...bookmarks.map(bm => bm.id));
    }
    renderBookmarks();
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeModal(); closeEditModal(); }
    });
    
    document.getElementById('modalUrl').addEventListener('input', autoFillName);
});

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function autoFillName() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    if (nameInput.value.trim() !== '') return;
    let url = urlInput.value.trim();
    if (url.startsWith('http://') || url.startsWith('https://')) {
        try {
            const urlObj = new URL(url);
            const name = urlObj.hostname.replace('www.', '').split('.')[0];
            nameInput.value = name.charAt(0).toUpperCase() + name.slice(1);
        } catch {}
    }
}

function openAddModal() {
    document.getElementById('modalTitle').textContent = '➕ Добавить закладку';
    document.getElementById('modalUrl').value = '';
    document.getElementById('modalName').value = '';
    document.getElementById('modalIcon').value = '';
    document.getElementById('addModal').classList.add('active');
    document.getElementById('modalUrl').focus();
}

function openEditModal(event, id) {
    event.stopPropagation();
    activeEditId = id;
    const bookmark = getBookmarks().find(bm => bm.id === id);
    if (!bookmark) return;
    document.getElementById('editName').value = bookmark.name;
    document.getElementById('editIcon').value = bookmark.customIcon || '';
    document.getElementById('editModal').classList.add('active');
    document.getElementById('editName').focus();
}

function closeModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('addModal').classList.remove('active');
}

function closeEditModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('editModal').classList.remove('active');
    activeEditId = null;
}

function addBookmark() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    const iconInput = document.getElementById('modalIcon');
    let url = urlInput.value.trim();
    let name = nameInput.value.trim();
    let customIcon = iconInput.value.trim() || null;
    
    if (!url) { showToast('Введите URL', 'error'); return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
    
    let domain;
    try {
        const urlObj = new URL(url);
        domain = urlObj.hostname;
        if (!name) name = domain.replace('www.', '').split('.')[0];
    } catch { domain = url; if (!name) name = 'Site'; }
    
    const bookmarks = getBookmarks();
    if (bookmarks.some(bm => bm.domain === domain)) {
        showToast('Уже есть!', 'error'); return;
    }
    
    bookmarks.unshift({ id: generateId(), url, domain, name: name.charAt(0).toUpperCase() + name.slice(1), customIcon });
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeModal();
    showToast('Добавлено!', 'success');
}

function saveBookmark() { addBookmark(); }

function saveEdit() {
    const newName = document.getElementById('editName').value.trim();
    const newIcon = document.getElementById('editIcon').value.trim() || null;
    if (!newName) { showToast('Введите название', 'error'); return; }
    
    let bookmarks = getBookmarks();
    const idx = bookmarks.findIndex(bm => bm.id === activeEditId);
    if (idx !== -1) {
        bookmarks[idx].name = newName;
        bookmarks[idx].customIcon = newIcon;
        saveBookmarks(bookmarks);
        renderBookmarks();
        showToast('Сохранено!', 'success');
    }
    closeEditModal();
}

function deleteBookmark() {
    if (!confirm('Удалить?')) return;
    let bookmarks = getBookmarks().filter(bm => bm.id !== activeEditId);
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeEditModal();
    showToast('Удалено', 'success');
}

function getBookmarks() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
}

function saveBookmarks(bookmarks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
}

function getFaviconUrl(domain, customIcon) {
    return customIcon || `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
}

function exportBookmarks() {
    const bookmarks = getBookmarks();
    if (bookmarks.length === 0) { showToast('Пусто', 'error'); return; }
    const blob = new Blob([JSON.stringify({ version: 1, bookmarks }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `bookmarks-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    showToast(`Экспорт: ${bookmarks.length}`, 'success');
}

function importBookmarks(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.bookmarks) throw new Error();
            const current = getBookmarks();
            const existing = new Set(current.map(bm => bm.domain));
            const newones = data.bookmarks.filter(bm => !existing.has(bm.domain)).map(bm => ({
                id: generateId(), url: bm.url, domain: bm.domain, name: bm.name, customIcon: bm.customIcon || null
            }));
            saveBookmarks([...newones, ...current]);
            renderBookmarks();
            showToast(`Импорт: ${newones.length}`, 'success');
        } catch { showToast('Ошибка файла', 'error'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function handleDragStart(e) {
    draggedElement = this;
    draggedId = this.dataset.id;
    isDragging = true;
    this.classList.add('dragging');
    e.dataTransfer.setData('text/plain', draggedId);
    setTimeout(() => this.style.opacity = '0.5', 0);
}

function handleDragOver(e) {
    e.preventDefault();
    if (this !== draggedElement && !this.classList.contains('add-tile')) this.classList.add('drag-over');
}

function handleDragLeave() { this.classList.remove('drag-over'); }

function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    if (!draggedId || this === draggedElement || this.classList.contains('add-tile')) return;
    const targetId = this.dataset.id;
    if (!targetId || targetId === draggedId) return;
    
    let bookmarks = getBookmarks();
    const di = bookmarks.findIndex(bm => String(bm.id) === String(draggedId));
    const ti = bookmarks.findIndex(bm => String(bm.id) === String(targetId));
    if (di === -1 || ti === -1) return;
    
    const [item] = bookmarks.splice(di, 1);
    bookmarks.splice(ti, 0, item);
    saveBookmarks(bookmarks);
    renderBookmarks();
    showToast('Перемещено', 'success');
}

function handleDragEnd() {
    this.style.opacity = '1';
    this.classList.remove('dragging');
    document.querySelectorAll('.bookmark-tile').forEach(t => t.classList.remove('drag-over'));
    draggedElement = draggedId = null;
    isDragging = false;
}

// ← ИСПРАВЛЕНО: Разные действия для ЛКМ и СКМ
function handleTileClick(e) {
    if (isDragging) { isDragging = false; return; }
    if (e.target.closest('.bookmark-edit-btn')) return;
    
    const bookmark = getBookmarks().find(bm => String(bm.id) === String(this.dataset.id));
    if (!bookmark) return;
    
    // Левая кнопка (0) → та же вкладка
    if (e.button === 0) {
        window.location.href = bookmark.url;
    }
    // Средняя кнопка (1) → новая вкладка
    else if (e.button === 1) {
        e.preventDefault();
        window.open(bookmark.url, '_blank');
    }
}

// ← ИСПРАВЛЕНО: Обработка иконок без inline onerror
function renderBookmarks() {
    const grid = document.getElementById('bookmarksGrid');
    const bookmarks = getBookmarks();
    grid.innerHTML = '';
    
    bookmarks.forEach(bm => {
        const tile = document.createElement('div');
        tile.className = 'bookmark-tile';
        tile.dataset.id = bm.id;
        tile.draggable = true;
        
        ['dragstart','dragover','dragleave','drop','dragend','click'].forEach(evt => {
            tile.removeEventListener(evt, handleDragStart);
            tile.removeEventListener(evt, handleDragOver);
            tile.removeEventListener(evt, handleDragLeave);
            tile.removeEventListener(evt, handleDrop);
            tile.removeEventListener(evt, handleDragEnd);
            tile.removeEventListener(evt, handleTileClick);
        });
        
        tile.addEventListener('dragstart', handleDragStart);
        tile.addEventListener('dragover', handleDragOver);
        tile.addEventListener('dragleave', handleDragLeave);
        tile.addEventListener('drop', handleDrop);
        tile.addEventListener('dragend', handleDragEnd);
        tile.addEventListener('click', handleTileClick);
        
        const iconUrl = getFaviconUrl(bm.domain, bm.customIcon);
        
        // ← Создаём элементы через DOM, не innerHTML
        const iconContainer = document.createElement('div');
        iconContainer.className = 'bookmark-icon';
        
        const img = document.createElement('img');
        img.src = iconUrl;
        img.alt = bm.name;
        img.style.pointerEvents = 'none';
        
        const placeholder = document.createElement('span');
        placeholder.className = 'placeholder';
        placeholder.textContent = '🌐';
        
        const editBtn = document.createElement('button');
        editBtn.className = 'bookmark-edit-btn';
        editBtn.textContent = '✏️';
        editBtn.title = 'Редактировать';
        editBtn.onclick = (e) => { e.stopPropagation(); openEditModal(e, bm.id); };
        
        iconContainer.appendChild(img);
        iconContainer.appendChild(placeholder);
        iconContainer.appendChild(editBtn);
        
        // ← Обработчик ошибки иконки
        img.onerror = () => {
            iconContainer.classList.add('icon-error');
        };
        img.onload = () => {
            iconContainer.classList.remove('icon-error');
        };
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'bookmark-name';
        nameSpan.textContent = bm.name;
        
        tile.appendChild(iconContainer);
        tile.appendChild(nameSpan);
        grid.appendChild(tile);
    });
    
    const addTile = document.createElement('div');
    addTile.className = 'add-tile';
    addTile.onclick = openAddModal;
    addTile.innerHTML = '<div class="bookmark-icon"></div><span class="bookmark-name">Добавить</span>';
    grid.appendChild(addTile);
}

function clearAllBookmarks() {
    if (confirm('Удалить ВСЁ?')) {
        localStorage.removeItem(STORAGE_KEY);
        renderBookmarks();
        showToast('Очищено', 'success');
    }
}
</script>
