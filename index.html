<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Yandex Clone</title>

<style>
/* Стили для кнопки-иконки */
.icon-btn {
    background: #3a3a3a;
    border: 1px solid #555;
    border-radius: 10px;
    padding: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    width: 44px;
    height: 44px;
    flex-shrink: 0;
}

.icon-btn:hover {
    background: #4a4a4a;
    border-color: #0366d6;
    transform: scale(1.05);
}

.icon-btn.active {
    border-color: #4caf50;
    box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.3);
}

.icon-btn.active .icon-text {
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
}

.icon-img {
    width: 24px;
    height: 24px;
    object-fit: contain;
    display: block;
    filter: brightness(0) invert(1);
}

.icon-text {
    font-size: 18px;
    display: block;
    line-height: 1;
}

/* 🔹 1. Скрываем стандартный input file */
#bgInput { display: none; }

.bg-upload {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 2000;
}

.bg-upload button {
    background: #3a3a3a;
    border: 1px solid #555;
    color: white;
    padding: 4px 8px;
    border-radius: 8px;
    cursor: pointer;
}

.bg-upload button:hover {
    background: #4a4a4a;
}

#bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -1;
    display: none;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    height: 100vh;
    background: #2b2b2b;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
}

.search-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: nowrap;
    width: fit-content;
    margin: 0 auto 20px;
}

.search-box {
    display: flex;
    align-items: center;
    background: #3a3a3a;
    border-radius: 30px;
    padding: 10px 15px;
    width: 650px;
    gap: 10px;

    flex-shrink: 0;
    position: relative;
}

.logo {
    font-weight: bold;
    font-size: 22px;
    color: #ff3b30;
}

input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: white;
    font-size: 16px;
}

input::placeholder { color: #aaa; }

button {
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;
    font-size: 18px;
}
button:hover { color: white; }

#imgBtn {
    position: absolute;
    right: -54px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    background: none;
    border: none;
    cursor: pointer;
    color: #ccc;

    height: 44px;
    border-radius: 50%;

}

#imgBtn:hover {
    color: white;
    background: rgb(0 0 0 / 30%);
}

.icon-svg {
    width: 24px;
    height: 24px;
    display: block;

/* 🔹 3. Полупрозрачный фон для ссылок */
.footer-links {

}
.footer-links a {
    color: #aaa;

}
.footer-links a:hover {
    color: white;

}

.bookmarks-widget {
    background: #3a3a3a;
    border-radius: 12px;
    padding: 15px 20px;
    width: 650px;
    margin-top: 10px;
}

.bookmarks-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid #555;
    flex-wrap: wrap;
    gap: 10px;
}

.bookmarks-title {
    font-size: 16px;
    font-weight: bold;
    color: #fff;
}

.bookmarks-actions {
    display: flex;
    gap: 8px;
    align-items: center;
}

.bookmarks-btn {
    font-size: 12px;
    color: #aaa;
    background: #2b2b2b;
    border: 1px solid #555;

    cursor: pointer;
    transition: all 0.2s;
}
.bookmarks-btn:hover {
    color: white;
    border-color: #0366d6;
    background: #252525;
}
.bookmarks-btn.danger:hover {
    color: white;
    border-color: #ff5555;
    background: #ff5555;
}

#importInput { display: none; }

.bookmarks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
    gap: 12px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 4px;
}

.bookmark-tile {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: grab;
    transition: transform 0.15s, opacity 0.15s;
    user-select: none;
}

.bookmark-tile:active { cursor: grabbing; }
.bookmark-tile.dragging { opacity: 0.5; transform: scale(1.05); z-index: 100; }
.bookmark-tile.drag-over { transform: scale(1.1); border: 2px dashed #0366d6; }

.bookmark-icon {
    width: 64px;
    height: 64px;
    background: #2b2b2b;
    border-radius: 14px;
    display: flex;

    justify-content: center;
    border: 2px solid transparent;

    position: relative;

.bookmark-icon img {

    color: #666;

    position: absolute;
    display: none;
}

.bookmark-icon.icon-error .placeholder { display: flex !important; }
.bookmark-icon.icon-error img { display: none !important; }

.bookmark-tile:hover .bookmark-icon {

    background: #252525;
}

.bookmark-name {
    font-size: 11px;
    color: #ccc;
    text-align: center;

    text-overflow: ellipsis;
    white-space: nowrap;

    height: 22px;

    color: white;

    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;

    pointer-events: auto;
}
.bookmark-tile:hover .bookmark-edit-btn { display: flex; }

.add-tile {
    display: flex;
    flex-direction: column;
    align-items: center;

.add-tile .bookmark-icon {

.add-tile:hover .bookmark-icon {

    background: #252525;
}

.add-tile:hover .bookmark-name { color: #0366d6; }

.modal-overlay {

    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.7);

    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);

.modal-overlay.active { display: flex; }

.modal-content {

    border: 1px solid #555;

@keyframes modalSlideIn {
    from { opacity: 0; transform: translateY(-20px) scale(0.95); }

.modal-header {

    justify-content: space-between;

    border-bottom: 1px solid #444;
}

.modal-title { font-size: 16px; font-weight: bold; color: #fff; }

.modal-close {
    background: none; border: none; color: #888;
    font-size: 24px; cursor: pointer; padding: 0; line-height: 1;
}
.modal-close:hover { color: white; }

.modal-body { display: flex; flex-direction: column; gap: 16px; }
.modal-row { display: flex; flex-direction: column; gap: 6px; }
.modal-row label { font-size: 12px; color: #aaa; font-weight: 500; }

.modal-row input {
    padding: 10px 12px;
    background: #3a3a3a;

.modal-row input:focus {

.modal-actions { display: flex; gap: 10px; margin-top: 8px; }
.modal-actions button {

.modal-actions .save-btn { background: #0366d6; color: white; }
.modal-actions .save-btn:hover { background: #0255b3; }
.modal-actions .cancel-btn { background: #4a4a4a; color: white; }
.modal-actions .cancel-btn:hover { background: #5a5a5a; }

.bookmarks-grid::-webkit-scrollbar { width: 4px; }
.bookmarks-grid::-webkit-scrollbar-track { background: #2b2b2b; border-radius: 2px; }
.bookmarks-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }

.toast {

    transform: translateX(-50%) translateY(100px);

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: #4caf50; }
.toast.error { border-color: #ff5555; }
</style>

<script>
// ============================================
// 🔹 IndexedDB для видео (большие файлы)
// ============================================
const IDB_DB_NAME = 'YandexCloneBG';
const IDB_STORE_NAME = 'backgrounds';
const IDB_VERSION = 1;

function openIndexedDB() {
    return new Promise((resolve, reject) => {
        const request = indexedDB.open(IDB_DB_NAME, IDB_VERSION);
        request.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(IDB_STORE_NAME)) {
                db.createObjectStore(IDB_STORE_NAME, { keyPath: 'id' });
            }
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
    });
}

async function saveBackgroundIndexedDB(file) {
    try {
        const db = await openIndexedDB();
        const tx = db.transaction(IDB_STORE_NAME, 'readwrite');
        const store = tx.objectStore(IDB_STORE_NAME);
        
        return new Promise((resolve, reject) => {
            const request = store.put({
                id: 'current_bg',
                data: file,
                type: file.type,
                timestamp: Date.now()
            });
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    } catch (err) {
        console.error('IndexedDB ошибка:', err);
        throw err;
    }
}

async function loadBackgroundIndexedDB() {
    try {
        const db = await openIndexedDB();
        const tx = db.transaction(IDB_STORE_NAME, 'readonly');
        const store = tx.objectStore(IDB_STORE_NAME);
        
        return new Promise((resolve) => {
            const request = store.get('current_bg');
            request.onsuccess = () => {
                if (!request.result) { resolve(null); return; }
                resolve(request.result);
            };
            request.onerror = () => resolve(null);
        });
    } catch (err) {
        console.error('IndexedDB ошибка:', err);
        return null;
    }
}

async function deleteBackgroundIndexedDB() {
    try {
        const db = await openIndexedDB();
        const tx = db.transaction(IDB_STORE_NAME, 'readwrite');
        const store = tx.objectStore(IDB_STORE_NAME);
        store.delete('current_bg');
    } catch (err) {
        console.error('IndexedDB ошибка:', err);
    }
}

// ============================================
// 🔹 LocalStorage для изображений (маленькие файлы)
// ============================================
const LS_BG_KEY = 'yandex_clone_bg_image';
const LS_BG_TYPE_KEY = 'yandex_clone_bg_type';

function saveBackgroundLocalStorage(base64Data, type) {
    try {
        localStorage.setItem(LS_BG_KEY, base64Data);
        localStorage.setItem(LS_BG_TYPE_KEY, type);
    } catch (err) {
        console.error('LocalStorage ошибка:', err);
        throw err;
    }
}

function loadBackgroundLocalStorage() {
    try {
        const data = localStorage.getItem(LS_BG_KEY);
        const type = localStorage.getItem(LS_BG_TYPE_KEY);
        if (data && type) {
            return { data, type };
        }
        return null;
    } catch (err) {
        console.error('LocalStorage ошибка:', err);
        return null;
    }
}

function deleteBackgroundLocalStorage() {
    localStorage.removeItem(LS_BG_KEY);
    localStorage.removeItem(LS_BG_TYPE_KEY);
}

// ============================================
// 🔹 Основные переменные
// ============================================
const bgInput = document.getElementById('bgInput');
const bgVideo = document.getElementById('bgVideo');
const soundToggle = document.getElementById('soundToggle');
const bgPlayToggle = document.getElementById('bgPlayToggle');

let bgPlayInBackground = false;
let currentBgObjectUrl = null; // Для очистки URL после загрузки

// ============================================
// 🔹 Загрузка сохранённого фона при старте
// ============================================
document.addEventListener('DOMContentLoaded', async () => {
    // Пробуем загрузить видео из IndexedDB
    const videoData = await loadBackgroundIndexedDB();
    if (videoData && videoData.type.startsWith('video')) {
        const url = URL.createObjectURL(videoData.data);
        currentBgObjectUrl = url;
        bgVideo.src = url;
        bgVideo.style.display = 'block';
        bgVideo.muted = true;
        bgVideo.play();
        soundToggle.style.display = 'block';
        soundToggle.textContent = '🔇';
        bgPlayToggle.style.display = 'flex';
        showToast('Видео-фон восстановлен', 'success');
    } else {
        // Пробуем загрузить изображение из LocalStorage
        const imageData = loadBackgroundLocalStorage();
        if (imageData && imageData.type.startsWith('image')) {
            document.body.style.background = `url(${imageData.data}) no-repeat center center fixed`;
            document.body.style.backgroundSize = 'cover';
            bgVideo.style.display = 'none';
            soundToggle.style.display = 'none';
            bgPlayToggle.style.display = 'none';
            showToast('Изображение-фон восстановлено', 'success');
        }
    }
    
    // Загружаем закладки
    const bookmarks = getBookmarks();
    if (bookmarks.length > 0) {
        idCounter = Math.max(...bookmarks.map(bm => bm.id));
    }
    renderBookmarks();
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { closeModal(); closeEditModal(); }
    });
    document.getElementById('modalUrl').addEventListener('input', autoFillName);
});

// ============================================
// 🔹 Обработчик выбора файла
// ============================================
bgInput.addEventListener('change', async function () {
    const file = this.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    // 🔹 Останавливаем и сбрасываем текущий фон
    bgVideo.pause();
    bgVideo.src = "";
    bgVideo.style.display = "none";
    soundToggle.style.display = "none";
    bgPlayToggle.style.display = "none";
    bgPlayToggle.classList.remove('active');
    bgPlayInBackground = false;
    
    // Очищаем предыдущий Object URL
    if (currentBgObjectUrl) {
        URL.revokeObjectURL(currentBgObjectUrl);
        currentBgObjectUrl = null;
    }
    
    // Сбрасываем фон
    document.body.style.background = "#2b2b2b";
    document.body.style.backgroundSize = "";
    document.body.style.backgroundImage = "";

    // 🔹 Применяем новый фон и сохраняем
    if (file.type.startsWith('image')) {
        // 📷 Изображение → LocalStorage
        document.body.style.background = `url(${url}) no-repeat center center fixed`;
        document.body.style.backgroundSize = "cover";
        
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                saveBackgroundLocalStorage(e.target.result, file.type);
                deleteBackgroundIndexedDB(); // Очищаем видео из IndexedDB
                showToast('Изображение сохранено', 'success');
            } catch (err) {
                showToast('Не удалось сохранить (слишком большое)', 'error');
            }
        };
        reader.readAsDataURL(file);
        
    } else if (file.type === 'video/mp4') {
        // 🎥 Видео → IndexedDB
        bgVideo.src = url;
        bgVideo.style.display = "block";
        bgVideo.muted = true;
        bgVideo.play();
        soundToggle.style.display = "block";
        soundToggle.textContent = "🔇";
        bgPlayToggle.style.display = "flex";
        currentBgObjectUrl = url;
        
        deleteBackgroundLocalStorage(); // Очищаем изображение из LocalStorage
        
        try {
            await saveBackgroundIndexedDB(file);
            showToast('Видео сохранено', 'success');
        } catch (err) {
            showToast('Не удалось сохранить видео', 'error');
        }
    }
});

// ============================================
// 🔹 Кнопка звука
// ============================================
soundToggle.onclick = () => {
    bgVideo.muted = !bgVideo.muted;
    soundToggle.textContent = bgVideo.muted ? "🔇" : "🔊";
};

// ============================================
// 🔹 Кнопка фонового воспроизведения
// ============================================
bgPlayToggle.onclick = () => {
    bgPlayInBackground = !bgPlayInBackground;
    bgPlayToggle.classList.toggle('active', bgPlayInBackground);
    bgPlayToggle.title = `Фоновое воспроизведение: ${bgPlayInBackground ? 'ВКЛ' : 'ВЫКЛ'}`;
    showToast(`Фон: ${bgPlayInBackground ? 'включён' : 'выключен'}`, 'success');
};

// ============================================
// 🔹 Отслеживание активности вкладки
// ============================================
document.addEventListener('visibilitychange', () => {
    if (bgVideo.style.display === 'block' && bgVideo.src) {
        if (document.hidden && !bgPlayInBackground) {
            bgVideo.pause();
        } else if (!document.hidden && bgVideo.paused) {
            bgVideo.play();
        }
    }
});

// ============================================
// 🔹 Сброс фона
// ============================================
function resetBackground() {
    if (confirm('Сбросить пользовательский фон и вернуть стандартный?')) {
        // Очищаем хранилища
        deleteBackgroundLocalStorage();
        deleteBackgroundIndexedDB();
        
        // Сбрасываем визуальный фон
        document.body.style.background = "#2b2b2b";
        document.body.style.backgroundSize = "";
        document.body.style.backgroundImage = "";
        
        // Останавливаем видео
        bgVideo.pause();
        bgVideo.src = "";
        bgVideo.style.display = "none";
        soundToggle.style.display = "none";
        bgPlayToggle.style.display = "none";
        
        // Очищаем Object URL
        if (currentBgObjectUrl) {
            URL.revokeObjectURL(currentBgObjectUrl);
            currentBgObjectUrl = null;
        }
        
        showToast('Фон сброшен', 'success');
    }
}

// ============================================
// 🔹 Поиск по картинке
// ============================================
document.getElementById('imgBtn').onclick = () => {
    window.location.href = "https://yandex.ru/images/";
};

document.addEventListener('paste', (e) => {
    const items = e.clipboardData.items;
    for (let item of items) {
        if (item.type.startsWith("image")) {
            window.location.href = "https://yandex.ru/images/";
            return;
        }
    }
});

// ============================================
// 🔹 Закладки (LocalStorage)
// ============================================
const STORAGE_KEY = 'yandex_clone_bookmarks';
const ICON_CACHE_KEY = 'yandex_clone_icon_cache';

let activeEditId = null;
let draggedElement = null;
let draggedId = null;
let isDragging = false;
let idCounter = Date.now();

function generateId() { return ++idCounter; }

function getCachedIcon(domain) {
    try {
        const cache = JSON.parse(localStorage.getItem(ICON_CACHE_KEY)) || {};
        return cache[domain] || null;
    } catch { return null; }
}

function saveIconToCache(domain, base64Data) {
    try {
        const cache = JSON.parse(localStorage.getItem(ICON_CACHE_KEY)) || {};
        const keys = Object.keys(cache);
        if (keys.length >= 50) {
            delete cache[keys[0]];
        }
        cache[domain] = base64Data;
        localStorage.setItem(ICON_CACHE_KEY, JSON.stringify(cache));
    } catch (e) {
        console.warn('Не удалось сохранить иконку в кэш:', e);
    }
}

function clearIconCache() {
    if (confirm('Очистить кэш иконок? Иконки загрузятся заново при следующем обновлении страницы.')) {
        localStorage.removeItem(ICON_CACHE_KEY);
        const bookmarks = getBookmarks();
        bookmarks.forEach(bm => { delete bm.cachedIcon; });
        saveBookmarks(bookmarks);
        location.reload();
    }
}

function imgToBase64(img) {
    try {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth || 64;
        canvas.height = img.naturalHeight || 64;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        return canvas.toDataURL('image/png');
    } catch { return null; }
}

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => { toast.className = 'toast'; }, 3000);
}

function autoFillName() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    if (nameInput.value.trim() !== '') return;
    let url = urlInput.value.trim();
    if (url.startsWith('http://') || url.startsWith('https://')) {
        try {
            const urlObj = new URL(url);
            const name = urlObj.hostname.replace('www.', '').split('.')[0];
            nameInput.value = name.charAt(0).toUpperCase() + name.slice(1);
        } catch {}
    }
}

function openAddModal() {
    document.getElementById('modalTitle').textContent = '➕ Добавить закладку';
    document.getElementById('modalUrl').value = '';
    document.getElementById('modalName').value = '';
    document.getElementById('modalIcon').value = '';
    document.getElementById('addModal').classList.add('active');
    document.getElementById('modalUrl').focus();
}

function openEditModal(event, id) {
    event.stopPropagation();
    activeEditId = id;
    const bookmark = getBookmarks().find(bm => bm.id === id);
    if (!bookmark) return;
    document.getElementById('editName').value = bookmark.name;
    document.getElementById('editIcon').value = bookmark.customIcon || '';
    document.getElementById('editModal').classList.add('active');
    document.getElementById('editName').focus();
}

function closeModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('addModal').classList.remove('active');
}

function closeEditModal(event) {
    if (event && event.target !== event.currentTarget) return;
    document.getElementById('editModal').classList.remove('active');
    activeEditId = null;
}

function addBookmark() {
    const urlInput = document.getElementById('modalUrl');
    const nameInput = document.getElementById('modalName');
    const iconInput = document.getElementById('modalIcon');
    let url = urlInput.value.trim();
    let name = nameInput.value.trim();
    let customIcon = iconInput.value.trim() || null;
    
    if (!url) { showToast('Введите URL', 'error'); return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
    
    let domain;
    try {
        const urlObj = new URL(url);
        domain = urlObj.hostname;
        if (!name) name = domain.replace('www.', '').split('.')[0];
    } catch { domain = url; if (!name) name = 'Site'; }
    
    const bookmarks = getBookmarks();
    if (bookmarks.some(bm => bm.url === url)) {
        showToast('Эта закладка уже есть!', 'error');
        return;
    }
    
    bookmarks.unshift({ id: generateId(), url, domain, name: name.charAt(0).toUpperCase() + name.slice(1), customIcon });
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeModal();
    showToast('Добавлено!', 'success');
}

function saveBookmark() { addBookmark(); }

function saveEdit() {
    const newName = document.getElementById('editName').value.trim();
    const newIcon = document.getElementById('editIcon').value.trim() || null;
    if (!newName) { showToast('Введите название', 'error'); return; }
    
    let bookmarks = getBookmarks();
    const idx = bookmarks.findIndex(bm => bm.id === activeEditId);
    if (idx !== -1) {
        bookmarks[idx].name = newName;
        bookmarks[idx].customIcon = newIcon;
        saveBookmarks(bookmarks);
        renderBookmarks();
        showToast('Сохранено!', 'success');
    }
    closeEditModal();
}

function deleteBookmark() {
    if (!confirm('Удалить?')) return;
    let bookmarks = getBookmarks().filter(bm => bm.id !== activeEditId);
    saveBookmarks(bookmarks);
    renderBookmarks();
    closeEditModal();
    showToast('Удалено', 'success');
}

function getBookmarks() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
}

function saveBookmarks(bookmarks) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks));
}

function getFaviconUrl(domain, customIcon, cachedIcon, forceReload = false) {
    if (customIcon) return customIcon;
    if (cachedIcon) return cachedIcon;
    const cached = getCachedIcon(domain);
    if (cached && !forceReload) return cached;
    const timestamp = Date.now();
    return `https://www.google.com/s2/favicons?domain=${domain}&sz=64&_t=${timestamp}`;
}

function exportBookmarks() {
    const bookmarks = getBookmarks();
    if (bookmarks.length === 0) { showToast('Пусто', 'error'); return; }
    const blob = new Blob([JSON.stringify({ version: 1, bookmarks }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `bookmarks-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    showToast(`Экспорт: ${bookmarks.length}`, 'success');
}

function importBookmarks(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = JSON.parse(e.target.result);
            if (!data.bookmarks) throw new Error();
            const current = getBookmarks();
            const existing = new Set(current.map(bm => bm.url));
            const newones = data.bookmarks.filter(bm => !existing.has(bm.url)).map(bm => ({
                id: generateId(), url: bm.url, domain: bm.domain, name: bm.name, customIcon: bm.customIcon || null
            }));
            saveBookmarks([...newones, ...current]);
            renderBookmarks();
            showToast(`Импорт: ${newones.length}`, 'success');
        } catch { showToast('Ошибка файла', 'error'); }
    };
    reader.readAsText(file);
    event.target.value = '';
}

function handleDragStart(e) {
    draggedElement = this;
    draggedId = this.dataset.id;
    isDragging = true;
    this.classList.add('dragging');
    e.dataTransfer.setData('text/plain', draggedId);
    setTimeout(() => this.style.opacity = '0.5', 0);
}

function handleDragOver(e) {
    e.preventDefault();
    if (this !== draggedElement && !this.classList.contains('add-tile')) this.classList.add('drag-over');
}

function handleDragLeave() { this.classList.remove('drag-over'); }

function handleDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    if (!draggedId || this === draggedElement || this.classList.contains('add-tile')) return;
    const targetId = this.dataset.id;
    if (!targetId || targetId === draggedId) return;
    
    let bookmarks = getBookmarks();
    const di = bookmarks.findIndex(bm => String(bm.id) === String(draggedId));
    const ti = bookmarks.findIndex(bm => String(bm.id) === String(targetId));
    if (di === -1 || ti === -1) return;
    
    const [item] = bookmarks.splice(di, 1);
    bookmarks.splice(ti, 0, item);
    saveBookmarks(bookmarks);
    renderBookmarks();
    showToast('Перемещено', 'success');
}

function handleDragEnd() {
    this.style.opacity = '1';
    this.classList.remove('dragging');
    document.querySelectorAll('.bookmark-tile').forEach(t => t.classList.remove('drag-over'));
    draggedElement = draggedId = null;
    isDragging = false;
}

function handleTileClick(e) {
    if (isDragging) { isDragging = false; return; }
    if (e.target.closest('.bookmark-edit-btn')) return;
    
    const bookmark = getBookmarks().find(bm => String(bm.id) === String(this.dataset.id));
    if (!bookmark) return;
    
    if (e.button === 0) {
        window.location.href = bookmark.url;
    } else if (e.button === 1) {
        e.preventDefault();
        window.open(bookmark.url, '_blank');
    }
}

function renderBookmarks() {
    const grid = document.getElementById('bookmarksGrid');
    const bookmarks = getBookmarks();
    grid.innerHTML = '';
    
    bookmarks.forEach(bm => {
        const tile = document.createElement('div');
        tile.className = 'bookmark-tile';
        tile.dataset.id = bm.id;
        tile.draggable = true;
        
        ['dragstart','dragover','dragleave','drop','dragend','click'].forEach(evt => {
            tile.removeEventListener(evt, handleDragStart);
            tile.removeEventListener(evt, handleDragOver);
            tile.removeEventListener(evt, handleDragLeave);
            tile.removeEventListener(evt, handleDrop);
            tile.removeEventListener(evt, handleDragEnd);
            tile.removeEventListener(evt, handleTileClick);
        });
        
        tile.addEventListener('dragstart', handleDragStart);
        tile.addEventListener('dragover', handleDragOver);
        tile.addEventListener('dragleave', handleDragLeave);
        tile.addEventListener('drop', handleDrop);
        tile.addEventListener('dragend', handleDragEnd);
        tile.addEventListener('click', handleTileClick);
        
        const iconUrl = getFaviconUrl(bm.domain, bm.customIcon, bm.cachedIcon, false);
        const isCached = iconUrl.startsWith('image');
        
        const iconContainer = document.createElement('div');
        iconContainer.className = 'bookmark-icon';
        
        const img = document.createElement('img');
        img.src = iconUrl;
        img.alt = bm.name;
        img.style.pointerEvents = 'none';
        
        const placeholder = document.createElement('span');
        placeholder.className = 'placeholder';
        placeholder.textContent = '🌐';
        
        const editBtn = document.createElement('button');
        editBtn.className = 'bookmark-edit-btn';
        editBtn.textContent = '✏️';
        editBtn.title = 'Редактировать';
        editBtn.onclick = (e) => { e.stopPropagation(); openEditModal(e, bm.id); };
        
        iconContainer.appendChild(img);
        iconContainer.appendChild(placeholder);
        iconContainer.appendChild(editBtn);
        
        img.onload = () => {
            iconContainer.classList.remove('icon-error');
            if (!isCached && !bm.customIcon) {
                const base64 = imgToBase64(img);
                if (base64) {
                    saveIconToCache(bm.domain, base64);
                    let bookmarks = getBookmarks();
                    const idx = bookmarks.findIndex(b => b.id === bm.id);
                    if (idx !== -1) {
                        bookmarks[idx].cachedIcon = base64;
                        saveBookmarks(bookmarks);
                    }
                }
            }
        };
        
        img.onerror = () => {
            iconContainer.classList.add('icon-error');
        };
        
        const nameSpan = document.createElement('span');
        nameSpan.className = 'bookmark-name';
        nameSpan.textContent = bm.name;
        
        tile.appendChild(iconContainer);
        tile.appendChild(nameSpan);
        grid.appendChild(tile);
    });
    
    const addTile = document.createElement('div');
    addTile.className = 'add-tile';
    addTile.onclick = openAddModal;
    addTile.innerHTML = '<div class="bookmark-icon"></div><span class="bookmark-name">Добавить</span>';
    grid.appendChild(addTile);
}

function clearAllBookmarks() {
    if (confirm('Удалить ВСЁ?')) {
        localStorage.removeItem(STORAGE_KEY);
        renderBookmarks();
        showToast('Очищено', 'success');
    }
}
</script>
